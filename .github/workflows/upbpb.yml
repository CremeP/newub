name: Auto Update Worker

on:
  push:
    branches:
      - main
  schedule:
    - cron: "19 2 */2 * *"
  workflow_dispatch:
    inputs:
      force_update:
        description: "是否强制更新（忽略版本检查）"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 设置环境
        run: |
          echo "REPO_URL=https://api.github.com/repos/bia-pain-bache/BPB-Worker-Panel/releases/latest" >> $GITHUB_ENV

      - name: 检查并更新 Worker
        id: check_update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          log() { echo "[$(date +'%Y-%m-%d %H:%M:%S')] $1"; }

          log "开始检查更新..."

          LOCAL_VERSION=$(cat version.txt 2>/dev/null || echo "")
          log "本地版本: ${LOCAL_VERSION:-无}"

          log "获取最新 Release 信息..."

          RESPONSE=$(curl -s --retry 3 \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "$REPO_URL")

          API_ERROR=$(echo "$RESPONSE" | jq -r '.message // empty')
          if [ -n "$API_ERROR" ]; then
            log "ERROR: GitHub API 返回错误：$API_ERROR"
            exit 1
          fi

          TAG_NAME=$(echo "$RESPONSE" | jq -r '.tag_name')

          log "最新版本: $TAG_NAME"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          FORCE_UPDATE="${{ github.event.inputs.force_update || 'false' }}"

          if [ "$LOCAL_VERSION" = "$TAG_NAME" ] && [ "$FORCE_UPDATE" != "true" ]; then
            log "已是最新版本，无需更新"
            exit 0
          fi

          # 优先 zip，其次 js
          ASSET_INFO=$(echo "$RESPONSE" | jq -r '
            (.assets[] | select(.name=="worker.zip")) //
            (.assets[] | select(.name=="worker.js")) //
            (.assets[] | select(.name|test("worker.*\\.zip$"))) //
            (.assets[] | select(.name|test("worker.*\\.js$")))
            | "\(.name)|\(.browser_download_url)"
          ' | head -n1)

          if [ -z "$ASSET_INFO" ]; then
            log "ERROR: Release 中未找到可用 Worker 文件。"
            log "可用附件："
            echo "$RESPONSE" | jq -r '.assets[].name'
            exit 1
          fi

          ASSET_NAME="${ASSET_INFO%%|*}"
          DOWNLOAD_URL="${ASSET_INFO##*|}"

          log "找到附件：$ASSET_NAME"

          TMP_FILE=$(mktemp)

          log "开始下载..."

          wget -q -O "$TMP_FILE" "$DOWNLOAD_URL"

          if [[ "$ASSET_NAME" == *.zip ]]; then
            log "检测到 ZIP 包，开始解压..."
            unzip -o "$TMP_FILE"
          elif [[ "$ASSET_NAME" == *.js ]]; then
            log "检测到 JS 文件，更新 worker.js..."
            cp "$TMP_FILE" worker.js
          else
            log "ERROR: 不支持的附件类型：$ASSET_NAME"
            rm -f "$TMP_FILE"
            exit 1
          fi

          rm -f "$TMP_FILE"

          echo "$TAG_NAME" > version.txt

          log "更新完成，新版本：$TAG_NAME"

      - name: 提交更改
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "🔄 自动同步 Worker 版本: ${{ steps.check_update.outputs.tag_name || '未知' }}"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
